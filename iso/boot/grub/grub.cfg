menuentry "IzacOS" {
    linux /boot/bzImage console=tty0 quiet
    initrd /boot/initramfs.cpio.gz
}

menuentry "IzacOS (nomodeset)" {
    linux /boot/bzImage console=tty0 nomodeset quiet
